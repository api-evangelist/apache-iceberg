          type: string
          const: add-schema
        schema:
          $ref: '#/components/schemas/Schema'
        last-column-id:
          type: integer
          deprecated: true
          description: 'This optional field is **DEPRECATED for REMOVAL** since it more safe to handle this internally, and shouldn''t be exposed to the clients.

            The highest assigned column ID for the table. This is used to ensure columns are always assigned an unused ID when evolving schemas. When omitted, it will be computed on the server side.'
    TableMetadata:
      type: object
