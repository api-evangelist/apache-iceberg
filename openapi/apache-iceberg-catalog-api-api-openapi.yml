          type: array
          uniqueItems: true
          items:
            type: string
          example:
          - department
          - access_group
        updates:
          type: object
          example:
            owner: Hank Bendickson
          additionalProperties:
            type: string
    ExpressionType:
      type: string
      example:
      - 'true'
      - 'false'
      - eq
      - and
      - or
      - not
      - in
      - not-in
      - lt
      - lt-eq
      - gt
      - gt-eq
      - not-eq
      - starts-with
