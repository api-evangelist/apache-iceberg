          description: Delete files referenced by file scan tasks
          type: array
          items:
            $ref: '#/components/schemas/DeleteFile'
        file-scan-tasks:
          type: array
          items:
            $ref: '#/components/schemas/FileScanTask'
        plan-tasks:
          type: array
          items:
            $ref: '#/components/schemas/PlanTask'
