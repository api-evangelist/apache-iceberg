      - $ref: '#/components/parameters/idempotency-key'
      responses:
        204:
          description: Success, no content
        400:
          $ref: '#/components/responses/BadRequestErrorResponse'
        401:
          $ref: '#/components/responses/UnauthorizedResponse'
        403:
          $ref: '#/components/responses/ForbiddenResponse'
        404:
          description: Not Found - NoSuchViewException, view to drop does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                ViewToDeleteDoesNotExist:
                  $ref: '#/components/examples/NoSuchViewError'
        419:
          $ref: '#/components/responses/AuthenticationTimeoutResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    head:
      tags:
      - Catalog API
      summary: Apache Iceberg Check if a View Exists
      operationId: viewExists
      description: Check if a view exists within a given namespace. This request does not return a response body.
      responses:
        204:
          description: Success, no content
        400:
          description: Bad Request
        401:
          description: Unauthorized
        404:
          description: Not Found
        419:
          $ref: '#/components/responses/AuthenticationTimeoutResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/{prefix}/views/rename:
    parameters:
    - $ref: '#/components/parameters/prefix'
    post:
      tags:
      - Catalog API
      summary: Apache Iceberg Rename a View from its Current Name to a New Name
      description: Rename a view from one identifier to another. It's valid to move a view across namespaces, but the server implementation is not required to support it.
      operationId: renameView
      parameters:
      - $ref: '#/components/parameters/idempotency-key'
      requestBody:
        description: Current view identifier to rename and new view identifier to rename to
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameTableRequest'
            examples:
              RenameViewSameNamespace:
                $ref: '#/components/examples/RenameViewSameNamespace'
        required: true
      responses:
        204:
          description: Success, no content
        400:
          $ref: '#/components/responses/BadRequestErrorResponse'
        401:
          $ref: '#/components/responses/UnauthorizedResponse'
        403:
          $ref: '#/components/responses/ForbiddenResponse'
        404:
          description: Not Found - NoSuchViewException, view to rename does not exist - NoSuchNamespaceException, The target namespace of the new identifier does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                ViewToRenameDoesNotExist:
                  $ref: '#/components/examples/NoSuchViewError'
                NamespaceToRenameToDoesNotExist:
                  $ref: '#/components/examples/NoSuchNamespaceError'
        406:
          $ref: '#/components/responses/UnsupportedOperationResponse'
        409:
          description: Conflict - The target identifier to rename to already exists as a table or view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                $ref: '#/components/examples/ViewAlreadyExistsError'
        419:
          $ref: '#/components/responses/AuthenticationTimeoutResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/{prefix}/namespaces/{namespace}/register-view:
    parameters:
    - $ref: '#/components/parameters/prefix'
    - $ref: '#/components/parameters/namespace'
    post:
      tags:
      - Catalog API
      summary: Apache Iceberg Register a View in the Catalog
      parameters:
      - $ref: '#/components/parameters/idempotency-key'
      description: Register a view in the given namespace using given metadata file location.
      operationId: registerView
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterViewRequest'
            examples:
              registerViewRequestExample:
                summary: Default registerView request
                x-microcks-default: true
                value:
                  name: example-value
                  metadata-location: s3://my-bucket/warehouse
      responses:
        200:
          $ref: '#/components/responses/LoadViewResponse'
        400:
          $ref: '#/components/responses/BadRequestErrorResponse'
        401:
          $ref: '#/components/responses/UnauthorizedResponse'
        403:
          $ref: '#/components/responses/ForbiddenResponse'
        404:
          description: Not Found - The namespace specified does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcebergErrorResponse'
              examples:
                NamespaceNotFound:
                  $ref: '#/components/examples/NoSuchNamespaceError'
        409:
          description: Conflict - The identifier already exists as a table or view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcebergErrorResponse'
              examples:
                ViewAlreadyExists:
                  $ref: '#/components/examples/ViewAlreadyExistsError'
        419:
          $ref: '#/components/responses/AuthenticationTimeoutResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    CommitTransactionRequest:
      type: object
      required:
      - table-changes
      properties:
        table-changes:
          type: array
          items:
            description: Table commit request; must provide an `identifier`
            $ref: '#/components/schemas/CommitTableRequest'
    SnapshotReferences:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/SnapshotReference'
    FalseExpression:
      type: object
      required:
      - type
      properties:
        type:
          $ref: '#/components/schemas/ExpressionType'
          const: 'false'
    SetDefaultSortOrderUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - sort-order-id
      properties:
        action:
          type: string
          const: set-default-sort-order
        sort-order-id:
          type: integer
          description: Sort order ID to set as the default, or -1 to set last added sort order
    UpdateNamespacePropertiesResponse:
      type: object
      required:
      - updated
      - removed
      properties:
        updated:
          description: List of property keys that were added or updated
          type: array
          uniqueItems: true
          items:
            type: string
        removed:
          description: List of properties that were removed
          type: array
          items:
            type: string
        missing:
          type: array
          items:
            type: string
          description: List of properties requested for removal that were not found in the namespace's properties. Represents a partial success response. Server's do not need to implement this.
          nullable: true
    CountMap:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/IntegerTypeValue'
          description: List of integer column ids for each corresponding value
        values:
          type: array
          items:
            $ref: '#/components/schemas/LongTypeValue'
          description: List of Long values, matched to 'keys' by index
      example:
        keys:
        - 1
        - 2
        values:
        - 100
        - 200
    DataFile:
      allOf:
      - $ref: '#/components/schemas/ContentFile'
      type: object
      required:
      - content
      properties:
        content:
          type: string
          const: data
        first-row-id:
          type: integer
          format: int64
          description: The first row ID assigned to the first row in the data file
        column-sizes:
          allOf:
          - $ref: '#/components/schemas/CountMap'
          description: Map of column id to total count, including null and NaN
        value-counts:
          allOf:
          - $ref: '#/components/schemas/CountMap'
          description: Map of column id to null value count
        null-value-counts:
          allOf:
          - $ref: '#/components/schemas/CountMap'
          description: Map of column id to null value count
        nan-value-counts:
          allOf:
          - $ref: '#/components/schemas/CountMap'
          description: Map of column id to number of NaN values in the column
        lower-bounds:
          allOf:
          - $ref: '#/components/schemas/ValueMap'
          description: Map of column id to lower bound primitive type values
        upper-bounds:
          allOf:
          - $ref: '#/components/schemas/ValueMap'
          description: Map of column id to upper bound primitive type values
    TimestampNanoTypeValue:
      type: string
      description: Timestamp_ns type values follow the 'YYYY-MM-DDTHH:MM:SS.sssssssss' ISO-8601 format with nanosecond precision
      example: '2007-12-03T10:15:30.123456789'
    LoadCredentialsResponse:
      type: object
      required:
      - storage-credentials
      properties:
        storage-credentials:
          type: array
          items:
            $ref: '#/components/schemas/StorageCredential'
    CommitReport:
      type: object
      required:
      - table-name
      - snapshot-id
      - sequence-number
      - operation
      - metrics
      properties:
        table-name:
          type: string
        snapshot-id:
          type: integer
          format: int64
        sequence-number:
          type: integer
          format: int64
        operation:
          type: string
        metrics:
          $ref: '#/components/schemas/Metrics'
        metadata:
          type: object
          additionalProperties:
            type: string
    FetchPlanningResult:
      type: object
      description: Result of server-side scan planning for fetchPlanningResult
      discriminator:
        propertyName: status
        mapping:
          completed: '#/components/schemas/CompletedPlanningResult'
          submitted: '#/components/schemas/EmptyPlanningResult'
          cancelled: '#/components/schemas/EmptyPlanningResult'
          failed: '#/components/schemas/FailedPlanningResult'
      oneOf:
      - $ref: '#/components/schemas/CompletedPlanningResult'
      - $ref: '#/components/schemas/FailedPlanningResult'
      - $ref: '#/components/schemas/EmptyPlanningResult'
    PartitionField:
      type: object
      required:
      - source-id
      - transform
      - name
      properties:
        field-id:
          type: integer
        source-id:
          type: integer
        name:
          type: string
        transform:
          $ref: '#/components/schemas/Transform'
    CreateNamespaceRequest:
      type: object
      required:
      - namespace
      properties:
        namespace:
          $ref: '#/components/schemas/Namespace'
        properties:
          type: object
          description: Configured string to string map of properties for the namespace
          example:
            owner: Hank Bendickson
          default: {}
          additionalProperties:
            type: string
    Metrics:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/MetricResult'
      example:
        metrics:
          total-planning-duration:
            count: 1
            time-unit: nanoseconds
            total-duration: 2644235116
          result-data-files:
            unit: count
            value: 1
          result-delete-files:
            unit: count
            value: 0
          total-data-manifests:
            unit: count
            value: 1
          total-delete-manifests:
            unit: count
            value: 0
          scanned-data-manifests:
            unit: count
            value: 1
          skipped-data-manifests:
            unit: count
            value: 0
          total-file-size-bytes:
            unit: bytes
            value: 10
          total-delete-file-size-bytes:
            unit: bytes
            value: 0
    Transform:
      type: string
      example:
      - identity
      - year
      - month
      - day
      - hour
      - bucket[256]
      - truncate[16]
    CreateTableRequest:
      type: object
      required:
      - name
      - schema
      properties:
        name:
          type: string
        location:
          type: string
        schema:
          $ref: '#/components/schemas/Schema'
        partition-spec:
          $ref: '#/components/schemas/PartitionSpec'
        write-order:
          $ref: '#/components/schemas/SortOrder'
        stage-create:
          type: boolean
        properties:
          type: object
          additionalProperties:
            type: string
    StatisticsFile:
      type: object
      required:
      - snapshot-id
      - statistics-path
      - file-size-in-bytes
      - file-footer-size-in-bytes
      - blob-metadata
      properties:
        snapshot-id:
          type: integer
          format: int64
        statistics-path:
          type: string
        file-size-in-bytes:
          type: integer
          format: int64
        file-footer-size-in-bytes:
          type: integer
          format: int64
        blob-metadata:
          type: array
          items:
            $ref: '#/components/schemas/BlobMetadata'
    Schema:
      allOf:
      - $ref: '#/components/schemas/StructType'
      - type: object
        properties:
          schema-id:
            type: integer
            readOnly: true
          identifier-field-ids:
            type: array
            items:
              type: integer
    PrimitiveTypeValue:
      oneOf:
      - $ref: '#/components/schemas/BooleanTypeValue'
      - $ref: '#/components/schemas/IntegerTypeValue'
      - $ref: '#/components/schemas/LongTypeValue'
      - $ref: '#/components/schemas/FloatTypeValue'
      - $ref: '#/components/schemas/DoubleTypeValue'
      - $ref: '#/components/schemas/DecimalTypeValue'
      - $ref: '#/components/schemas/StringTypeValue'
      - $ref: '#/components/schemas/UUIDTypeValue'
      - $ref: '#/components/schemas/DateTypeValue'
      - $ref: '#/components/schemas/TimeTypeValue'
      - $ref: '#/components/schemas/TimestampTypeValue'
      - $ref: '#/components/schemas/TimestampTzTypeValue'
      - $ref: '#/components/schemas/TimestampNanoTypeValue'
      - $ref: '#/components/schemas/TimestampTzNanoTypeValue'
      - $ref: '#/components/schemas/FixedTypeValue'
      - $ref: '#/components/schemas/BinaryTypeValue'
    FetchScanTasksResult:
      type: object
      description: Response schema for fetchScanTasks
      allOf:
      - $ref: '#/components/schemas/ScanTasks'
    SetExpression:
      type: object
      required:
      - type
      - term
      - values
      properties:
        type:
          $ref: '#/components/schemas/ExpressionType'
          enum:
          - in
          - not-in
        term:
          $ref: '#/components/schemas/Term'
        values:
          type: array
          items:
            $ref: '#/components/schemas/PrimitiveTypeValue'
    AddSortOrderUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - sort-order
      properties:
        action:
          type: string
          const: add-sort-order
        sort-order:
          $ref: '#/components/schemas/SortOrder'
    SnapshotLog:
      type: array
      items:
        type: object
        required:
        - snapshot-id
        - timestamp-ms
        properties:
          snapshot-id:
            type: integer
            format: int64
          timestamp-ms:
            type: integer
            format: int64
    RemoteSignRequest:
      description: The request to be signed remotely.
      type: object
      required:
      - region
      - uri
      - method
      - headers
      properties:
        region:
          type: string
        uri:
          type: string
        method:
          type: string
          enum:
          - PUT
          - GET
          - HEAD
          - POST
          - DELETE
          - PATCH
          - OPTIONS
        headers:
          $ref: '#/components/schemas/MultiValuedMap'
        properties:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
          description: Optional body of the request to send to the signing API. This should only be populated for requests where the body of the message contains content which must be validated before a request is signed, such as the S3 DeleteObjects call.
        provider:
          type: string
          description: The storage provider for which the request is to be signed. The provider should correspond to the scheme used for a storage native URI. For example `s3` for AWS S3 paths. For backwards compatibility, if this is not specified, the provider is assumed to be `s3`.
    PlanTableScanResult:
      type: object
      description: Result of server-side scan planning for planTableScan
      discriminator:
        propertyName: status
        mapping:
          completed: '#/components/schemas/CompletedPlanningWithIDResult'
          submitted: '#/components/schemas/AsyncPlanningResult'
          cancelled: '#/components/schemas/EmptyPlanningResult'
          failed: '#/components/schemas/FailedPlanningResult'
      oneOf:
      - $ref: '#/components/schemas/CompletedPlanningWithIDResult'
      - $ref: '#/components/schemas/FailedPlanningResult'
      - $ref: '#/components/schemas/AsyncPlanningResult'
      - $ref: '#/components/schemas/EmptyPlanningResult'
    PlanStatus:
      description: Status of a server-side planning operation
      type: string
      enum:
      - completed
      - submitted
      - cancelled
      - failed
    CreateNamespaceResponse:
      type: object
      required:
      - namespace
      properties:
        namespace:
          $ref: '#/components/schemas/Namespace'
        properties:
          type: object
          additionalProperties:
            type: string
          description: Properties stored on the namespace, if supported by the server.
          example:
            owner: Ralph
            created_at: '1452120468'
          default: {}
    PartitionStatisticsFile:
      type: object
      required:
      - snapshot-id
      - statistics-path
      - file-size-in-bytes
      properties:
        snapshot-id:
          type: integer
          format: int64
        statistics-path:
          type: string
        file-size-in-bytes:
          type: integer
          format: int64
    NotExpression:
      type: object
      required:
      - type
      - child
      properties:
        type:
          $ref: '#/components/schemas/ExpressionType'
          const: not
        child:
          $ref: '#/components/schemas/Expression'
    RemovePropertiesUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - removals
      properties:
        action:
          type: string
          const: remove-properties
        removals:
          type: array
          items:
            type: string
    Snapshot:
      type: object
      required:
      - snapshot-id
      - timestamp-ms
      - manifest-list
      - summary
      properties:
        snapshot-id:
          type: integer
          format: int64
        parent-snapshot-id:
          type: integer
          format: int64
        sequence-number:
          type: integer
          format: int64
        timestamp-ms:
          type: integer
          format: int64
        manifest-list:
          type: string
          description: Location of the snapshot's manifest list file
        first-row-id:
          type: integer
          format: int64
          description: The first _row_id assigned to the first row in the first data file in the first manifest
        added-rows:
          type: integer
          format: int64
          description: The upper bound of the number of rows with assigned row IDs
        summary:
          type: object
          required:
          - operation
          properties:
            operation:
              type: string
              enum:
              - append
              - replace
              - overwrite
              - delete
          additionalProperties:
            type: string
        schema-id:
          type: integer
    SetPropertiesUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - updates
      properties:
        action:
          type: string
          const: set-properties
        updates:
          type: object
          additionalProperties:
            type: string
    MapType:
      type: object
      required:
      - type
      - key-id
      - key
      - value-id
      - value
      - value-required
      properties:
        type:
          type: string
          const: map
        key-id:
          type: integer
        key:
          $ref: '#/components/schemas/Type'
        value-id:
          type: integer
        value:
          $ref: '#/components/schemas/Type'
        value-required:
          type: boolean
    FetchScanTasksRequest:
      type: object
      required:
      - plan-task
      properties:
        plan-task:
          $ref: '#/components/schemas/PlanTask'
    ReportMetricsRequest:
      anyOf:
      - $ref: '#/components/schemas/ScanReport'
      - $ref: '#/components/schemas/CommitReport'
      required:
      - report-type
      properties:
        report-type:
          type: string
    RemovePartitionSpecsUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - spec-ids
      properties:
        action:
          type: string
          const: remove-partition-specs
        spec-ids:
          type: array
          items:
            type: integer
    ErrorModel:
      type: object
      description: JSON error payload returned in a response with further details on the error
      required:
      - message
      - type
      - code
      properties:
        message:
          type: string
          description: Human-readable error message
        type:
          type: string
          description: Internal type definition of the error
          example: NoSuchNamespaceException
        code:
          type: integer
          minimum: 400
          maximum: 600
          description: HTTP response code
          example: 404
        stack:
          type: array
          items:
            type: string
    ViewUpdate:
      anyOf:
      - $ref: '#/components/schemas/AssignUUIDUpdate'
      - $ref: '#/components/schemas/UpgradeFormatVersionUpdate'
      - $ref: '#/components/schemas/AddSchemaUpdate'
      - $ref: '#/components/schemas/SetLocationUpdate'
      - $ref: '#/components/schemas/SetPropertiesUpdate'
      - $ref: '#/components/schemas/RemovePropertiesUpdate'
      - $ref: '#/components/schemas/AddViewVersionUpdate'
      - $ref: '#/components/schemas/SetCurrentViewVersionUpdate'
    IcebergErrorResponse:
      description: JSON wrapper for all error responses (non-2xx)
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorModel'
      additionalProperties: false
      example:
        error:
          message: The server does not support this operation
          type: UnsupportedOperationException
          code: 406
    ListNamespacesResponse:
      type: object
      properties:
        next-page-token:
          $ref: '#/components/schemas/PageToken'
        namespaces:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Namespace'
    CompletedPlanningResult:
      type: object
      description: Completed server-side planning result
      allOf:
      - $ref: '#/components/schemas/ScanTasks'
      - type: object
        required:
        - status
        properties:
          status:
            $ref: '#/components/schemas/PlanStatus'
            const: completed
          storage-credentials:
            type: array
            description: 'Storage credentials for accessing the files returned in the scan result.

              If the server returns storage credentials as part of the completed scan planning response, the expectation is for the client to use these credentials to read the files returned in the FileScanTasks as part of the scan result.'
            items:
              $ref: '#/components/schemas/StorageCredential'
    SetSnapshotRefUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      - $ref: '#/components/schemas/SnapshotReference'
      required:
      - ref-name
      properties:
        action:
          type: string
          const: set-snapshot-ref
        ref-name:
          type: string
    BlobMetadata:
      type: object
      required:
      - type
      - snapshot-id
      - sequence-number
      - fields
      properties:
        type:
          type: string
        snapshot-id:
          type: integer
          format: int64
        sequence-number:
          type: integer
          format: int64
        fields:
          type: array
          items:
            type: integer
        properties:
          type: object
          additionalProperties:
            type: string
    AddViewVersionUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - view-version
      properties:
        action:
          type: string
          const: add-view-version
        view-version:
          $ref: '#/components/schemas/ViewVersion'
    CommitViewRequest:
      type: object
      required:
      - updates
      properties:
        identifier:
          description: View identifier to update
          $ref: '#/components/schemas/TableIdentifier'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/ViewRequirement'
        updates:
          type: array
          items:
            $ref: '#/components/schemas/ViewUpdate'
    PlanTask:
      description: An opaque string provided by the REST server that represents a unit of work to produce file scan tasks for scan planning. This allows clients to fetch tasks across multiple requests to accommodate large result sets.
      type: string
    EmptyPlanningResult:
      type: object
      description: Empty server-side planning result
      required:
      - status
      properties:
        status:
          $ref: '#/components/schemas/PlanStatus'
          enum:
          - submitted
          - cancelled
    RemoteSignResult:
      description: The result of a remote request signing operation.
      type: object
      required:
      - uri
      - headers
      properties:
        uri:
          type: string
        headers:
          $ref: '#/components/schemas/MultiValuedMap'
    DeleteFile:
      discriminator:
        propertyName: content
        mapping:
          position-deletes: '#/components/schemas/PositionDeleteFile'
          equality-deletes: '#/components/schemas/EqualityDeleteFile'
      oneOf:
      - $ref: '#/components/schemas/PositionDeleteFile'
      - $ref: '#/components/schemas/EqualityDeleteFile'
    BooleanTypeValue:
      type: boolean
      example: true
    TableUpdate:
      anyOf:
      - $ref: '#/components/schemas/AssignUUIDUpdate'
      - $ref: '#/components/schemas/UpgradeFormatVersionUpdate'
      - $ref: '#/components/schemas/AddSchemaUpdate'
      - $ref: '#/components/schemas/SetCurrentSchemaUpdate'
      - $ref: '#/components/schemas/AddPartitionSpecUpdate'
      - $ref: '#/components/schemas/SetDefaultSpecUpdate'
