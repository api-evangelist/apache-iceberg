          minimum: 1
          maximum: 3
        table-uuid:
          type: string
        location:
          type: string
        last-updated-ms:
          type: integer
          format: int64
        next-row-id:
          type: integer
          format: int64
          description: A long higher than all assigned row IDs; the next snapshot's first-row-id.
        properties:
          type: object
          additionalProperties:
            type: string
        schemas:
          type: array
          items:
            $ref: '#/components/schemas/Schema'
        current-schema-id:
