          description: Properties stored on the namespace, if supported by the server. If the server does not support namespace properties, it should return null for this field. If namespace properties are supported, but none are set, it should return an empty object.
          additionalProperties:
            type: string
          example:
            owner: Ralph
            transient_lastDdlTime: '1452120468'
          default: {}
          nullable: true
    FieldName:
      description: 'A full field name (including parent field names), such as those passed in APIs like Java `Schema#findField(String name)`.

        The nested field name follows these rules - Nested struct fields are named by concatenating field names at each struct level using dot (`.`) delimiter, e.g. employer.contact_info.address.zip_code - Nested fields in a map key are named using the keyword `key`, e.g. employee_address_map.key.first_name - Nested fields in a map value are named using the keyword `value`, e.g. employee_address_map.value.zip_code - Nested fields in a list are named using the keyword `element`, e.g. employees.element.first_name'
      type: string
    UnaryExpression:
      type: object
      required:
      - type
      - term
      properties:
        type:
          $ref: '#/components/schemas/ExpressionType'
          enum:
          - is-null
          - not-null
          - is-nan
          - not-nan
        term:
          $ref: '#/components/schemas/Term'
    TimestampTypeValue:
      type: string
      description: Timestamp type values follow the 'YYYY-MM-DDTHH:MM:SS.ssssss' ISO-8601 format with microsecond precision
      example: '2007-12-03T10:15:30.123456'
    Term:
      oneOf:
      - $ref: '#/components/schemas/Reference'
      - $ref: '#/components/schemas/TransformTerm'
    StringTypeValue:
      type: string
