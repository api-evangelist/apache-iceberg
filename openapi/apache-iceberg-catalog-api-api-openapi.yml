          type: integer
          format: int64
        last-sequence-number:
          type: integer
          format: int64
        snapshot-log:
          $ref: '#/components/schemas/SnapshotLog'
        metadata-log:
          $ref: '#/components/schemas/MetadataLog'
        statistics:
          type: array
          items:
            $ref: '#/components/schemas/StatisticsFile'
        partition-statistics:
          type: array
          items:
            $ref: '#/components/schemas/PartitionStatisticsFile'
    SortDirection:
      type: string
      enum:
      - asc
      - desc
    EqualityDeleteFile:
      allOf:
      - $ref: '#/components/schemas/ContentFile'
      required:
      - content
      properties:
        content:
          type: string
          const: equality-deletes
        equality-ids:
          type: array
          items:
            type: integer
          description: List of equality field IDs
    UpgradeFormatVersionUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - format-version
      properties:
        action:
          type: string
          const: upgrade-format-version
        format-version:
          type: integer
    LoadViewResult:
      description: 'Result used when a view is successfully loaded.



        The view metadata JSON is returned in the `metadata` field. The corresponding file location of view metadata is returned in the `metadata-location` field.

        Clients can check whether metadata has changed by comparing metadata locations after the view has been created.


        The `config` map returns view-specific configuration for the view''s resources.


        The following configurations should be respected by clients:


        ## General Configurations


        - `token`: Authorization bearer token to use for view requests if OAuth2 security is enabled

        '
      type: object
      required:
      - metadata-location
      - metadata
      properties:
        metadata-location:
          type: string
        metadata:
          $ref: '#/components/schemas/ViewMetadata'
        config:
          type: object
          additionalProperties:
            type: string
    AndOrExpression:
      type: object
      required:
      - type
      - left
      - right
      properties:
        type:
          $ref: '#/components/schemas/ExpressionType'
          enum:
          - and
          - or
        left:
          $ref: '#/components/schemas/Expression'
        right:
          $ref: '#/components/schemas/Expression'
    FloatTypeValue:
      type: number
      format: float
      example: 3.14
    SetLocationUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - location
      properties:
        action:
          type: string
          const: set-location
        location:
          type: string
    FileScanTask:
      type: object
      required:
      - data-file
      properties:
        data-file:
          $ref: '#/components/schemas/DataFile'
        delete-file-references:
          description: A list of indices in the delete files array (0-based)
          type: array
          items:
            type: integer
        residual-filter:
          description: 'An optional filter to be applied to rows in this file scan task.

            If the residual is not present, the client must produce the residual or use the original filter.'
          allOf:
          - $ref: '#/components/schemas/Expression'
    LongTypeValue:
      type: integer
      format: int64
      example: 9223372036854775807
    RegisterTableRequest:
      type: object
      required:
      - name
      - metadata-location
      properties:
        name:
          type: string
        metadata-location:
          type: string
        overwrite:
          description: Whether to overwrite table metadata if the table already exists
          type: boolean
          default: false
    NullOrder:
      type: string
      enum:
      - nulls-first
      - nulls-last
    FileFormat:
      type: string
      enum:
      - avro
      - orc
      - parquet
      - puffin
    TableRequirement:
      type: object
      discriminator:
        propertyName: type
        mapping:
          assert-create: '#/components/schemas/AssertCreate'
          assert-table-uuid: '#/components/schemas/AssertTableUUID'
          assert-ref-snapshot-id: '#/components/schemas/AssertRefSnapshotId'
          assert-last-assigned-field-id: '#/components/schemas/AssertLastAssignedFieldId'
          assert-current-schema-id: '#/components/schemas/AssertCurrentSchemaId'
          assert-last-assigned-partition-id: '#/components/schemas/AssertLastAssignedPartitionId'
          assert-default-spec-id: '#/components/schemas/AssertDefaultSpecId'
          assert-default-sort-order-id: '#/components/schemas/AssertDefaultSortOrderId'
      properties:
        type:
          type: string
      required:
      - type
    ScanReport:
      type: object
      required:
      - table-name
      - snapshot-id
      - filter
      - schema-id
      - projected-field-ids
      - projected-field-names
      - metrics
      properties:
        table-name:
          type: string
        snapshot-id:
          type: integer
          format: int64
        filter:
          $ref: '#/components/schemas/Expression'
        schema-id:
          type: integer
        projected-field-ids:
          type: array
          items:
            type: integer
        projected-field-names:
          type: array
          items:
            type: string
        metrics:
          $ref: '#/components/schemas/Metrics'
        metadata:
          type: object
          additionalProperties:
            type: string
    DateTypeValue:
      type: string
      format: date
      description: Date type values follow the 'YYYY-MM-DD' ISO-8601 standard date format
      example: '2007-12-03'
    FixedTypeValue:
      type: string
      description: Fixed length type values are stored and serialized as an uppercase hexadecimal string preserving the fixed length
      example: 78797A
    CommitTableRequest:
      type: object
      required:
      - requirements
      - updates
      properties:
        identifier:
          description: Table identifier to update; must be present for CommitTransactionRequest
          $ref: '#/components/schemas/TableIdentifier'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/TableRequirement'
        updates:
          type: array
          items:
            $ref: '#/components/schemas/TableUpdate'
    Expression:
      oneOf:
      - $ref: '#/components/schemas/TrueExpression'
      - $ref: '#/components/schemas/FalseExpression'
      - $ref: '#/components/schemas/AndOrExpression'
      - $ref: '#/components/schemas/NotExpression'
      - $ref: '#/components/schemas/SetExpression'
      - $ref: '#/components/schemas/LiteralExpression'
      - $ref: '#/components/schemas/UnaryExpression'
    PlanTableScanRequest:
      type: object
      properties:
        snapshot-id:
          description: Identifier for the snapshot to scan in a point-in-time scan
          type: integer
          format: int64
        select:
          description: List of selected schema fields
          type: array
          items:
            $ref: '#/components/schemas/FieldName'
        filter:
          description: Expression used to filter the table data
          $ref: '#/components/schemas/Expression'
        min-rows-requested:
          description: The minimum number of rows requested for the scan. This is used as a hint to the server to not have to return more rows than necessary. It is not required for the server to return that many rows since the scan may not produce that many rows. The server can also return more rows than requested.
          type: integer
          format: int64
        case-sensitive:
          description: Enables case sensitive field matching for filter and select
          type: boolean
          default: true
        use-snapshot-schema:
          description: 'Whether to use the schema at the time the snapshot was written.

            When time travelling, the snapshot schema should be used (true). When scanning a branch, the table schema should be used (false).'
          type: boolean
          default: false
        start-snapshot-id:
          description: Starting snapshot ID for an incremental scan (exclusive)
          type: integer
          format: int64
        end-snapshot-id:
          description: 'Ending snapshot ID for an incremental scan (inclusive).

            Required when start-snapshot-id is specified.'
          type: integer
          format: int64
        stats-fields:
          description: List of fields for which the service should send column stats.
          type: array
          items:
            $ref: '#/components/schemas/FieldName'
    TransformTerm:
      type: object
      required:
      - type
      - transform
      - term
      properties:
        type:
          type: string
          const: transform
        transform:
          $ref: '#/components/schemas/Transform'
        term:
          $ref: '#/components/schemas/Reference'
    Namespace:
      description: Reference to one or more levels of a namespace
      type: array
      items:
        type: string
      example:
      - accounting
      - tax
    SetCurrentSchemaUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - schema-id
      properties:
        action:
          type: string
          const: set-current-schema
        schema-id:
          type: integer
          description: Schema ID to set as current, or -1 to set last added schema
    BinaryTypeValue:
      type: string
      description: Binary type values are stored and serialized as an uppercase hexadecimal string
      example: 78797A
    TimerResult:
      type: object
      required:
      - time-unit
      - count
      - total-duration
      properties:
        time-unit:
          type: string
        count:
          type: integer
          format: int64
        total-duration:
          type: integer
          format: int64
    CommitTableResponse:
      type: object
      required:
      - metadata-location
      - metadata
      properties:
        metadata-location:
          type: string
        metadata:
          $ref: '#/components/schemas/TableMetadata'
    CompletedPlanningWithIDResult:
      type: object
      allOf:
      - $ref: '#/components/schemas/CompletedPlanningResult'
      - type: object
        required:
        - plan-id
        properties:
          plan-id:
            description: ID used to track a planning request
            type: string
    PrimitiveType:
      type: string
      example:
      - long
      - string
      - fixed[16]
      - decimal(10,2)
    AssignUUIDUpdate:
      description: Assigning a UUID to a table/view should only be done when creating the table/view. It is not safe to re-assign the UUID if a table/view already has a UUID assigned
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - uuid
      properties:
        action:
          type: string
          const: assign-uuid
        uuid:
          type: string
    Type:
      oneOf:
      - $ref: '#/components/schemas/PrimitiveType'
      - $ref: '#/components/schemas/StructType'
      - $ref: '#/components/schemas/ListType'
      - $ref: '#/components/schemas/MapType'
    PartitionSpec:
      type: object
      required:
      - fields
      properties:
        spec-id:
          type: integer
          readOnly: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/PartitionField'
    CounterResult:
      type: object
      required:
      - unit
      - value
      properties:
        unit:
          type: string
        value:
          type: integer
          format: int64
    ViewRequirement:
      type: object
      discriminator:
        propertyName: type
        mapping:
          assert-view-uuid: '#/components/schemas/AssertViewUUID'
      oneOf:
      - $ref: '#/components/schemas/AssertViewUUID'
    RenameTableRequest:
      type: object
      required:
      - source
      - destination
      properties:
        source:
          $ref: '#/components/schemas/TableIdentifier'
        destination:
          $ref: '#/components/schemas/TableIdentifier'
    SetPartitionStatisticsUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - partition-statistics
      properties:
        action:
          type: string
          const: set-partition-statistics
        partition-statistics:
          $ref: '#/components/schemas/PartitionStatisticsFile'
    SetStatisticsUpdate:
      allOf:
      - $ref: '#/components/schemas/BaseUpdate'
      required:
      - statistics
      properties:
        action:
          type: string
          const: set-statistics
        snapshot-id:
          type: integer
          format: int64
          deprecated: true
          description: This optional field is **DEPRECATED for REMOVAL** since it contains redundant information. Clients should use the `statistics.snapshot-id` field instead.
        statistics:
          $ref: '#/components/schemas/StatisticsFile'
    StorageCredential:
      type: object
      required:
      - prefix
      - config
      properties:
        prefix:
          type: string
          description: Indicates a storage location prefix where the credential is relevant. Clients should choose the most specific prefix (by selecting the longest prefix) if several credentials of the same type are available.
        config:
          type: object
          additionalProperties:
            type: string
    LoadTableResult:
      description: "Result used when a table is successfully loaded.\n\n\nThe table metadata JSON is returned in the `metadata` field. The corresponding file location of table metadata should be returned in the `metadata-location` field, unless the metadata is not yet committed. For example, a create transaction may return metadata that is staged but not committed.\nClients can check whether metadata has changed by comparing metadata locations after the table has been created.\n\n\nThe `config` map returns table-specific configuration for the table's resources, including its HTTP client and FileIO. For example, config may contain a specific FileIO implementation class for the table depending on its underlying storage.\n\n\nThe following configurations should be respected by clients:\n\n## General Configurations\n\n- `token`: Authorization bearer token to use for table requests if OAuth2 security is enabled\n- `scan-planning-mode`: Communicates to clients the supported planning mode. Clients should use this value to fail fast if the supported scanning mode is not available on the client. Valid values:\n  - `client`: Clients MUST use client-side scan planning\n  - `server`: Clients MUST use server-side scan planning via the `planTableScan` endpoint\n\n## AWS Configurations\n\nThe following configurations should be respected when working with tables stored in AWS S3\n - `client.region`: region to configure client for making requests to AWS\n - `s3.access-key-id`: id for credentials that provide access to the data in S3\n - `s3.secret-access-key`: secret for credentials that provide access to data in S3\n - `s3.session-token`: if present, this value should be used for as the session token\n - `s3.remote-signing-enabled`: if `true` remote signing should be performed as described in the `RemoteSignRequest` schema section of this spec document.\n - `s3.cross-region-access-enabled`: if `true`, S3 Cross-Region bucket access is enabled\n\n## Storage Credentials\n\nCredentials for ADLS / GCS / S3 / ... are provided through the `storage-credentials` field.\nClients must first check whether the respective credentials exist in the `storage-credentials` field before checking the `config` for credentials.\n\n## Remote Signing\n\nIf remote signing for a specific storage provider is enabled, clients must respect the following configurations when creating a remote signer client:\n - `signer.endpoint`: the remote signer endpoint. Required. Can either be a relative path (to be resolved against `signer.uri`) or an absolute URI.\n - `signer.uri`: the base URI to resolve `signer.endpoint` against. Optional. Only meaningful if `signer.endpoint` is a relative path. Defaults to the catalog's base URI if not set.\n"
      type: object
      required:
      - metadata
      properties:
        metadata-location:
          type: string
          description: May be null if the table is staged as part of a transaction
          nullable: true
        metadata:
          $ref: '#/components/schemas/TableMetadata'
        config:
          type: object
          additionalProperties:
            type: string
        storage-credentials:
          type: array
          items:
            $ref: '#/components/schemas/StorageCredential'
  examples:
    NoSuchTableError:
      summary: The requested table does not exist
      value:
        error:
          message: The given table does not exist
          type: NoSuchTableException
          code: 404
    NamespaceAlreadyExistsError:
      summary: The requested namespace already exists
      value:
        error:
          message: The given namespace already exists
          type: AlreadyExistsException
          code: 409
    ListTablesNonEmptyExample:
      summary: A non-empty list of table identifiers
      value:
        identifiers:
        - namespace:
          - accounting
          - tax
          name: paid
        - namespace:
          - accounting
          - tax
          name: owed
    NoSuchNamespaceError:
      summary: The requested namespace does not exist
      value:
        error:
          message: The given namespace does not exist
          type: NoSuchNamespaceException
          code: 404
    UpdateAndRemoveNamespacePropertiesRequest:
      summary: An update namespace properties request with both properties to remove and properties to upsert.
      value:
        removals:
        - foo
        - bar
        updates:
          owner: Raoul
    RenameTableSameNamespace:
      summary: Rename a table in the same namespace
      value:
        source:
          namespace:
          - accounting
          - tax
          name: paid
        destination:
          namespace:
          - accounting
          - tax
          name: owed
    NamespaceNotEmptyError:
      summary: The requested namespace is not empty
      value:
        error:
          message: The given namespace is not empty
          type: NamespaceNotEmptyException
          code: 409
    NoSuchPlanIdError:
      summary: The plan id does not exist
      value:
        error:
          message: The plan id does not exist
          type: NoSuchPlanIdException
          code: 404
    NoSuchViewError:
      summary: The requested view does not exist
      value:
        error:
          message: The given view does not exist
          type: NoSuchViewException
          code: 404
    RenameViewSameNamespace:
      summary: Rename a view in the same namespace
      value:
        source:
          namespace:
          - accounting
          - tax
          name: paid-view
        destination:
          namespace:
          - accounting
          - tax
          name: owed-view
    ListTablesEmptyExample:
      summary: An empty list for a namespace with no tables
      value:
        identifiers: []
    ListNamespacesNonEmptyExample:
      summary: A non-empty list of namespaces
      value:
        namespaces:
        - - accounting
          - tax
        - - accounting
          - credits
    UnprocessableEntityDuplicateKey:
      summary: The request body either has the same key multiple times in what should be a map with unique keys or the request body has keys in two or more fields which should be disjoint sets.
      value:
        error:
          message: The request cannot be processed as there is a key present multiple times
          type: UnprocessableEntityException
          code: 422
    TableAlreadyExistsError:
      summary: The requested table identifier already exists
      value:
        error:
          message: The given table already exists
          type: AlreadyExistsException
          code: 409
    ListNamespacesEmptyExample:
      summary: An empty list of namespaces
      value:
        namespaces: []
    NoSuchPlanTaskError:
      summary: The plan task does not exist
      value:
        error:
          message: The plan task does not exist
          type: NoSuchPlanTaskException
          code: 404
    ViewAlreadyExistsError:
      summary: The requested view identifier already exists
      value:
        error:
          message: The given view already exists
          type: AlreadyExistsException
          code: 409
  parameters:
    idempotency-key:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 017F22E2-79B0-7CC3-98C4-DC0C0C07398F
      description: "Optional client-provided idempotency key for safe request retries.\n\nWhen present, the server ensures no additional effects for requests that carry the same\nIdempotency-Key. If a prior request with this key has been finalized, the server returns\nan equivalent final response without re-running the operation. The response body may\nreflect a newer state of the catalog than existed at the time of the commit.\n\nFinalization rules:\n- Finalize & replay: 200, 201, 204, and deterministic terminal 4xx (including 409\n  such as AlreadyExists, NamespaceNotEmpty, etc.)\n- Do not finalize (not stored/replayed): 5xx\n\nKey Requirements:\n- Key format: UUIDv7 in string form (RFC 9562).\n- The idempotency key must be globally unique (no reuse across different operations).\n- Catalogs SHOULD NOT expire keys before the end of the advertised token lifetime.\n- If Idempotency-Key is used, clients MUST reuse the same key when retrying the same\n  logical operation and MUST generate a new key for a different operation.\n"
    view:
      name: view
      in: path
      description: A view name
      required: true
      schema:
        type: string
      example: sales
    plan-id:
      name: plan-id
      in: path
      description: ID used to track a planning request
      required: true
      schema:
        type: string
    etag:
      name: ETag
      in: header
      description: 'Identifies a unique version of the table metadata.

        Implementations that support ETags should produce unique tags for responses that return different metadata content but represent the same version of table metadata.  For example, the `snapshots` query parameter may result in different metadata representations depending on whether `refs` or `all` is provided, therefore should have distinct ETags.'
      required: false
      schema:
        type: string
    referenced-by:
      name: referenced-by
      in: query
      description: 'A comma-separated list of fully qualified view names (namespace and view name) representing the view reference chain when an entity (table or view) is loaded via a view. The list should be ordered with the outermost view first, followed by any intermediate views it references, down to the view that directly references the entity. For a simple case where a view directly references the entity, the list contains a single view identifier. For nested views (a view referencing another view which references the entity), the list contains multiple view identifiers representing the complete dependency chain.

        The view identifier is a composite string of the format {namespace}{separator}{viewName}. The namespace-separator (defined in /config) acts as the delimiter. When parsing, the last occurrence of this separator identifies the boundary between the namespace and the view name. Multipart namespaces must follow the encoding rules of the parent parameter in the list namespaces endpoint.

        Multiple view identifiers are separated by commas. Servers should split the parameter value on comma characters to parse individual view identifiers. If view names contain commas, they must be url-encoded as %2C.

        Example with multiple views (where prod%1Fanalytics is a nested namespace which has a quarterly_view which references to monthly_view which then references the entity being loaded) - prod%1Fanalytics%1Fquarterly_view,prod%1Fanalytics%1Fmonthly_view'
      required: false
      schema:
        type: string
    page-token:
      name: pageToken
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/PageToken'
    namespace:
      name: namespace
      in: path
      required: true
      description: A namespace identifier as a single string. Multipart namespace parts must be separated by the namespace separator as indicated via the /config override `namespace-separator`, which defaults to the unit separator `0x1F` byte (url encoded `%1F`). To be compatible with older clients, servers must use both the advertised separator and `0x1F` as valid separators when decoding namespaces. The `namespace-separator` should be provided in a url encoded form.
      schema:
        type: string
      examples:
        singlepart_namespace:
          value: accounting
        multipart_namespace:
          value: accounting%1Ftax
    table:
      name: table
      in: path
      description: A table name
      required: true
      schema:
        type: string
      example: sales
    page-size:
      name: pageSize
      in: query
      description: For servers that support pagination, this signals an upper bound of the number of results that a client will receive. For servers that do not support pagination, clients may receive results larger than the indicated `pageSize`.
      required: false
      schema:
        type: integer
        minimum: 1
    prefix:
      name: prefix
      in: path
      schema:
        type: string
      required: true
      description: An optional prefix in the path
    data-access:
      name: X-Iceberg-Access-Delegation
      in: header
      description: 'Optional signal to the server that the client supports delegated access via a comma-separated list of access mechanisms.  The server may choose to supply access via any or none of the requested mechanisms.


        Specific properties and handling for `vended-credentials` and `remote-signing` are documented in the `LoadTableResult` schema section of this spec document.

        '
      required: false
      schema:
        type: string
        enum:
        - vended-credentials
        - remote-signing
      style: simple
      explode: false
      example: vended-credentials,remote-signing
  responses:
    BadRequestErrorResponse:
      description: Indicates a bad request error. It could be caused by an unexpected request body format or other forms of request validation failure, such as invalid json. Usually serves application/json content, although in some cases simple text/plain content might be returned by the server's middleware.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IcebergErrorResponse'
          example:
            error:
              message: Malformed request
              type: BadRequestException
              code: 400
    ForbiddenResponse:
      description: Forbidden. Authenticated user does not have the necessary permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IcebergErrorResponse'
          example:
            error:
              message: Not authorized to make this request
              type: NotAuthorizedException
              code: 403
    AuthenticationTimeoutResponse:
      description: This is an optional status response type that the REST Catalog can issue when the token has expired. The client MAY request a new access token and retry the request. 401 UnauthorizedResponse SHOULD be preferred over this response type on token expiry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IcebergErrorResponse'
          example:
            error:
              message: Credentials have timed out
              type: AuthenticationTimeoutException
              code: 419
    RemoteSignResponse:
      description: The response containing signed & unsigned headers. The server will also send a Cache-Control header, indicating whether the response can be cached (Cache-Control = ["private"]) or not (Cache-Control = ["no-cache"]).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RemoteSignResult'
    CommitTableResponse:
      description: 'Response used when a table is successfully updated.

        The table metadata JSON is returned in the metadata field. The corresponding file location of table metadata must be returned in the metadata-location field. Clients can check whether metadata has changed by comparing metadata locations.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommitTableResponse'
      headers:
        etag:
          $ref: '#/components/parameters/etag'
    ServerErrorResponse:
      description: A server-side problem that might not be addressable from the client side. Used for server 5xx errors without more specific documentation in individual routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IcebergErrorResponse'
          example:
            error:
              message: Internal Server Error
              type: InternalServerError
              code: 500
    CreateNamespaceResponse:
      description: Represents a successful call to create a namespace. Returns the namespace created, as well as any properties that were stored for the namespace, including those the server might have added. Implementations are not required to support namespace properties.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateNamespaceResponse'
          example:
            namespace:
            - accounting
            - tax
            properties:
              owner: Ralph
              created_at: '1452120468'
    LoadCredentialsResponse:
      description: Table credentials result when loading credentials for a table
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoadCredentialsResponse'
    PlanTableScanResponse:
      description: Result of submitting a table scan to plan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanTableScanResult'
    LoadTableResponse:
      description: Table metadata result when loading a table
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoadTableResult'
      headers:
        etag:
          $ref: '#/components/parameters/etag'
    CreateTableResponse:
      description: Table metadata result after creating a table
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoadTableResult'
      headers:
        etag:
          $ref: '#/components/parameters/etag'
    UpdateNamespacePropertiesResponse:
      description: JSON data response for a synchronous update properties request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateNamespacePropertiesResponse'
          example:
            updated:
            - owner
            removed:
            - foo
            missing:
            - bar
    ListTablesResponse:
      description: A list of table identifiers
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListTablesResponse'
          examples:
            ListTablesResponseNonEmpty:
              $ref: '#/components/examples/ListTablesNonEmptyExample'
            ListTablesResponseEmpty:
              $ref: '#/components/examples/ListTablesEmptyExample'
    UnauthorizedResponse:
      description: Unauthorized. The REST Catalog SHOULD respond with the 401 UnauthorizedResponse when the access token provided is expired, revoked, malformed, or invalid for other reasons. The client MAY request a new access token and retry the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IcebergErrorResponse'
          example:
            error:
              message: Not authorized to make this request
