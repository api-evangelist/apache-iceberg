        name:
          type: string
        type:
          $ref: '#/components/schemas/Type'
        required:
          type: boolean
        doc:
          type: string
        initial-default:
          $ref: '#/components/schemas/PrimitiveTypeValue'
        write-default:
          $ref: '#/components/schemas/PrimitiveTypeValue'
    RemoveStatisticsUpdate:
