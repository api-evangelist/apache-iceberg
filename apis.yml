aid: apache-iceberg
name: Apache Iceberg
description: >-
  Apache Iceberg is an open table format for large analytic datasets that provides ACID transactions, schema evolution, hidden partitioning, and time travel. It works with Spark, Flink, Hive, Presto, Trino, DuckDB, ClickHouse, and many more compute engines. Governed by the Apache Software Foundation under the Apache 2.0 license.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ACID
  - Analytics
  - Apache
  - Data Lake
  - Lakehouse
  - Open Source
  - Table Format
created: '2026-03-16'
modified: '2026-04-19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-iceberg/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-iceberg:rest-catalog-api
    name: Apache Iceberg REST Catalog API
    description: >-
      The Iceberg REST Catalog API defines the specification for catalog server implementations, enabling table discovery, creation, metadata management, namespace management, and multi-table transactions over HTTP. It is the standard integration point for compute engines connecting to Iceberg catalogs.
    humanURL: https://iceberg.apache.org/rest-catalog-spec/
    tags:
      - Catalog
      - Namespace
      - REST
      - Table Format
    properties:
      - type: Documentation
        url: https://iceberg.apache.org/rest-catalog-spec/
      - type: OpenAPI
        url: openapi/apache-iceberg-rest-catalog-open-api.yaml

  - aid: apache-iceberg:java-api
    name: Apache Iceberg Java API
    description: >-
      The Iceberg Java API provides programmatic access to table operations, schema management, partition management, and catalog implementations. It is the primary library for integrating Iceberg with JVM-based compute engines including Spark, Flink, Hive, Trino, and Presto.
    humanURL: https://iceberg.apache.org/javadoc/latest/
    tags:
      - Java
      - JVM
      - SDK
      - Table Format
    properties:
      - type: Documentation
        url: https://iceberg.apache.org/javadoc/latest/
      - type: GettingStarted
        url: https://iceberg.apache.org/docs/latest/java-api-quickstart/

  - aid: apache-iceberg:python-api
    name: PyIceberg Python API
    description: >-
      PyIceberg is the official Python implementation of the Apache Iceberg table specification. It provides programmatic access to Iceberg table metadata and data, with integrations for PyArrow, Pandas, DuckDB, Ray, Polars, and multiple catalog backends.
    humanURL: https://py.iceberg.apache.org/
    tags:
      - Python
      - SDK
      - Table Format
    properties:
      - type: Documentation
        url: https://py.iceberg.apache.org/
      - type: SDK
        url: https://pypi.org/project/pyiceberg/
      - type: GitHubRepository
        url: https://github.com/apache/iceberg-python

